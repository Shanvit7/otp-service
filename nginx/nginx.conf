worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream pool ───────────────────────────────────────────────────────
    upstream otp_api {
        server api_1:3000;
        server api_2:3000;
        server api_3:3000;
        keepalive 32;
    }

    # ── Edge rate limiting ──────────────────────────────────────────────────
    # IP-level coarse throttle — first line of defence before app-level limits.
    # 10 req/s per IP with a burst allowance of 20.
    limit_req_zone $binary_remote_addr zone=otp_zone:10m rate=10r/s;

    server {
        listen 80;

        location / {
            limit_req zone=otp_zone burst=20 nodelay;

            proxy_pass         http://otp_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Retry on another replica if one fails
            proxy_next_upstream   error timeout;
            proxy_connect_timeout 2s;
            proxy_read_timeout    10s;
        }

        location /health {
            # Health endpoint bypasses rate limiter
            proxy_pass http://otp_api;
        }
    }
}
